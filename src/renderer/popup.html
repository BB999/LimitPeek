<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self';" />
  <title>LimitPeek</title>
  <style>
    :root {
      --fg: rgba(255,255,255,0.92);
      --fg-dim: rgba(255,255,255,0.5);
      --track: rgba(255,255,255,0.12);
      --bar: #4f9dff;
      --bar-warn: #ffb84d;
      --bar-hot: #ff5c5c;
      --line: rgba(255,255,255,0.1);
      --accent: #2ea043;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --fg: rgba(0,0,0,0.85);
        --fg-dim: rgba(0,0,0,0.45);
        --track: rgba(0,0,0,0.1);
        --line: rgba(0,0,0,0.08);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 13px/1.4 -apple-system, "SF Pro Text", system-ui, sans-serif;
      color: var(--fg);
      padding: 12px 14px;
      -webkit-user-select: none;
      user-select: none;
    }
    .svc { margin-bottom: 12px; }
    .svc-head {
      display: flex; align-items: baseline; justify-content: space-between;
      margin-bottom: 6px;
    }
    .svc-name { font-weight: 600; font-size: 13px; }
    .svc-note { font-size: 11px; color: var(--fg-dim); }
    .row { margin: 5px 0; }
    .row-top {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--fg-dim); margin-bottom: 3px;
    }
    .row-top .pct { color: var(--fg); font-variant-numeric: tabular-nums; }
    .track { height: 6px; border-radius: 3px; background: var(--track); overflow: hidden; }
    .fill { height: 100%; border-radius: 3px; background: var(--bar); width: 0%; transition: width .3s ease; }
    .divider { height: 1px; background: var(--line); margin: 10px 0; }
    .actions { display: flex; gap: 8px; align-items: center; }
    button {
      flex: 1; font: inherit; font-size: 12px; color: var(--fg);
      background: var(--track); border: none; border-radius: 6px;
      padding: 7px 8px; cursor: pointer;
    }
    button:hover { background: rgba(127,127,127,0.25); }
    button.icon { flex: 0 0 auto; width: 34px; padding: 7px 0; }
    .updated { font-size: 10px; color: var(--fg-dim); text-align: center; margin-top: 8px; }
    .disabled { opacity: 0.4; }
    /* 更新あり: ボタンを強調 */
    button.has-update { background: var(--accent); color: #fff; }
    button.has-update:hover { background: var(--accent); filter: brightness(1.08); }
    button:disabled { opacity: 0.5; cursor: default; }

    /* --- 設定パネル（常時表示） --- */
    .set-field {
      display: flex; align-items: center; justify-content: space-between;
      margin: 9px 0; font-size: 12px;
    }
    .set-field .label { color: var(--fg); }
    .set-field .hint { font-size: 10px; color: var(--fg-dim); margin-top: 1px; }
    input[type="number"] {
      width: 56px; font: inherit; font-size: 12px; text-align: right;
      padding: 3px 6px; border-radius: 6px; border: 1px solid var(--line);
      background: var(--track); color: var(--fg);
    }
    /* トグルスイッチ */
    .switch { position: relative; width: 38px; height: 22px; flex: 0 0 auto; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer; border-radius: 22px;
      background: var(--track); transition: .2s;
    }
    .slider::before {
      content: ""; position: absolute; height: 16px; width: 16px; left: 3px; top: 3px;
      background: #fff; border-radius: 50%; transition: .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.3);
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }
    .set-saved {
      font-size: 10px; color: var(--accent); text-align: center;
      height: 12px; opacity: 0; transition: opacity .2s; margin-top: 4px;
    }
    .set-saved.show { opacity: 1; }
    /* 言語セグメントトグル */
    .seg {
      display: inline-flex; flex: 0 0 auto; border-radius: 6px;
      background: var(--track); padding: 2px; gap: 2px;
    }
    .seg-btn {
      flex: 0 0 auto; width: auto; font: inherit; font-size: 11px;
      color: var(--fg-dim); background: transparent; border: none; border-radius: 4px;
      padding: 4px 10px; cursor: pointer;
    }
    .seg-btn:hover { background: rgba(127,127,127,0.2); }
    .seg-btn.active { background: var(--accent); color: #fff; }
    .seg-btn.active:hover { background: var(--accent); }
  </style>
</head>
<body>
  <div id="claude" class="svc"></div>
  <div id="codex" class="svc"></div>

  <!-- 設定パネル（常時表示） -->
  <div id="settings">
    <div class="divider"></div>
    <div class="set-field">
      <div>
        <div class="label" data-i18n="interval">更新間隔</div>
        <div class="hint" data-i18n="intervalHint">1〜30 分</div>
      </div>
      <div><input type="number" id="interval" min="1" max="30" step="1" /> <span data-i18n="min">分</span></div>
    </div>
    <div class="set-field">
      <div class="label" data-i18n="watchClaude">Claude Code を監視</div>
      <label class="switch"><input type="checkbox" id="watchClaude" /><span class="slider"></span></label>
    </div>
    <div class="set-field">
      <div class="label" data-i18n="watchCodex">Codex を監視</div>
      <label class="switch"><input type="checkbox" id="watchCodex" /><span class="slider"></span></label>
    </div>
    <div class="set-field">
      <div class="label" data-i18n="launchAtLogin">ログイン時に自動起動</div>
      <label class="switch"><input type="checkbox" id="launchAtLogin" /><span class="slider"></span></label>
    </div>
    <div class="set-field">
      <div>
        <div class="label" data-i18n="pulseOnSession">稼働中アニメーション</div>
        <div class="hint" data-i18n="pulseOnSessionHint">セッション中ロゴがもこもこ動く</div>
      </div>
      <label class="switch"><input type="checkbox" id="pulseOnSession" /><span class="slider"></span></label>
    </div>
    <div class="set-field">
      <div class="label" data-i18n="trayWindow">メニューバー表示</div>
      <div class="seg" id="traySeg">
        <button type="button" class="seg-btn" data-win="5h">5h</button>
        <button type="button" class="seg-btn" data-win="7d">7d</button>
        <button type="button" class="seg-btn" data-win="both" data-i18n="both">両方</button>
      </div>
    </div>
    <div class="set-field">
      <div class="label" data-i18n="trayContent">表示内容</div>
      <div class="seg" id="contentSeg">
        <button type="button" class="seg-btn" data-content="both" data-i18n="contentBoth">バー+数字</button>
        <button type="button" class="seg-btn" data-content="bar" data-i18n="contentBar">バー</button>
        <button type="button" class="seg-btn" data-content="pct" data-i18n="contentPct">数字</button>
      </div>
    </div>
    <div class="set-field">
      <div class="label" data-i18n="language">言語</div>
      <div class="seg" id="langSeg">
        <button type="button" class="seg-btn" data-lang="ja">日本語</button>
        <button type="button" class="seg-btn" data-lang="en">English</button>
      </div>
    </div>
    <div class="set-saved" id="setSaved" data-i18n="saved">保存しました</div>
  </div>

  <div class="divider"></div>
  <!-- アプリ自動更新 -->
  <div class="actions">
    <button id="appUpdate" data-i18n="checkUpdate">アプリをアップデート</button>
  </div>
  <div id="updateNote" class="updated"></div>

  <div class="divider"></div>
  <div class="actions">
    <button id="refresh" data-i18n="refresh">使用率を更新</button>
    <button id="quit" data-i18n="quit">終了</button>
  </div>

  <div id="updated" class="updated"></div>
  <script src="popup.js"></script>
</body>
</html>
